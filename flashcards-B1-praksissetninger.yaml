- question: "Hverdagsliv liv og daglige rutiner"
  answer: |
    Jeg har en fast rutine i hverdagen min.
    Jeg står opp tidlig hver morgen.
    I helgen liker jeg å slappe av.
    Fritiden min bruker jeg på familien min.
    Jeg har en travel hverdag, men jeg trives.

- question: "Familie og venner"
  answer: |
    Jeg bor sammen med familien min.
    Jeg har to barn som går på skole.
    Jeg snakker ofte med venner etter jobb.
    Kollegaene mine er veldig hyggelige.
    Naboene mine er hjelpsomme.

- question: "Hjem og sted"
  answer: |
    Jeg bor i en leilighet i Oslo.
    Nabolaget mitt er rolig og trygt.
    Jeg liker byen der jeg bor.
    Huset mitt er ikke så stort, men det er fint.
    Jeg tilbringer mye tid hjemme.

- question: "Arbeid og studie"
  answer: |
    Jeg jobber som IT-ingeniør.
    Jobben min er interessant og utfordrende.
    Jeg har mange oppgaver på jobb.
    Jeg har møte med kollegaene mine hver uke.
    Jeg synes utdanning er viktig.

- question: "Mening og kommunikasjon"
  answer: |
    Jeg mener at det er viktig å lære språk.
    Jeg synes Norge er et godt land å bo i.
    Jeg tenker at helse er veldig viktig.
    Jeg forstår spørsmålet ditt.
    Jeg vil forklare min mening.

- question: "Helse og livsstil"
  answer: |
    Jeg prøver å spise sunn mat.
    Jeg trener to ganger i uken.
    Jeg føler meg frisk og aktiv.
    Søvn er viktig for god helse.
    Jeg prøver å unngå stress.

- question: "Samfunn og Norge"
  answer: |
    Jeg liker norsk kultur.
    Samfunnet i Norge er godt organisert.
    Språket er viktig for integrering.
    Jeg følger norske regler.
    Politikk er interessant, men vanskelig.

- question: "Transport og reise"
  answer: |
    Jeg tar buss til jobb hver dag.
    Noen ganger er bussen forsinket.
    Jeg liker å reise med tog.
    Trafikken i byen kan være travel.
    Jeg kjøper billett på mobilen.

- question: "Koblingsord og struktur"
  answer: |
    Jeg liker jobben min fordi den er interessant.
    Jeg kom sent fordi bussen var forsinket.
    Jeg jobber mye, men jeg har fritid også.
    Først spiser jeg frokost, deretter drar jeg på jobb.
    Til slutt slapper jeg av hjemme.

- question: "Verbbruk i hverdagen"
  answer: |
    Jeg bruker internett hver dag.
    Jeg snakker norsk med kollegaene mine.
    Jeg lærer norsk for å forstå samfunnet bedre.
    Jeg gjør oppgavene mine på jobb.
    Jeg bor i Norge og trives godt her.