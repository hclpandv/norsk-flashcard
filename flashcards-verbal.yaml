# Verbs (VÆRE / BLI)
#
- question: "å gjøre seg klar for noe"
  answer: |
    to get ready for something
    Nå gjør jeg meg klar for jobb

- question: "å ta seg noe tid"
  answer: |
    to take some time 
    Først tar jeg meg litt tid til å slappe av og skifter klær

- question: "å ta vare på noe / å ta seg av noe"
  answer: |
    å ta vare på noe / noen = to take care of (protect, look after, keep safe)
    Hun tar vare på barna. Ta vare på deg selv! (ta vare! .. common expression)
    ↔
    å ta seg av noe / noen = to take responsibility for / handle / deal with
    Jeg skal ta meg av dette. Han tar seg av kundene.

- question: "å [få/ha] tilgang til noe"
  answer: |
    to get access to something 
    Jeg fikk tilgang til systemet
    Han har ikke tilgang til kontoen

- question: "å la noen gjøre noe"
  answer: |
    to let someone do something
    En serie lar meg følge karakterene over en lang periode.

- question: |
    å handle om noe / å handle noe
  answer: |
    å handle om = to deal with/to be about (handler-handlet-har handlet)
    Utdanning handler om kunnskap.
    Det handler om frihet og rettferdighet  
    å handle = to shop
    Nordmenn drar ofte til Sverige for å handle billig

- question: "å nærme seg"
  answer: |
    to approach/to get closer to something (always reflexive)
    17. mai nærmer seg. Sommeren nærmer seg
    Vi nærmer oss målet.

- question: "å spre noe / spre seg"
  answer: |
    to spread (something)
    Sykdommen sprer seg 
    Informasjonen sprer seg raskt på nettet.
    Nyheter sprer seg veldig fort i sosiale medier.
    
- question: "å drive noe / å drive med noe"
  answer: |
    å drive noe = to run/operate (a business, system, activity), De driver et selskap.
    å drive med noe = to be involved in/ do (activity, job, hobby), Jeg driver med IT. Hva driver du med?
    å betjene= to operate (machines, equipment), Han betjener maskinen.
    å styre= to control/operate, Hun styrer skipet (Prosjektet)
    
- question: "å være lei av noe"
  answer: |
    tired of
    Hun er lei av å jobbe hele tiden → She is tired of working all the time

    
- question: "å være ærlig med noen"
  answer: |
    to be honest with someone
    Jeg er bare ærlig med deg.
    Du må være ærlig med foreldrene dine. 
    Kan jeg være helt ærlig med deg? 

- question: "å skylde på noen"
  answer: |
    to blame someone
    Jeg mener at det er viktig å ta ansvar i stedet for å skylde på andre.

- question: "å reagere på noe"
  answer: |
    to react on something
    Jeg reagerte ikke på meldingen.
    Hvordan reagerte du på nyheten?
    reaksjon = reaction

- question: "å angre på noe"
  answer: |
    to regret something (angrer-angret-har angret)
    Jeg angrer på at jeg ikke begynte tidligere.
    Hun angrer skikkelig på det som har skedd.

- question: "å være ferdig med noe"
  answer: |
    to be finished with something
    Jeg er ferdig med oppgaven.
    Hun er ferdig med jobben for i dag.

- question: "å være nødt til å gjøre noe"
  answer: |
    å være nødt til å gjøre noe = å måtte gjøre noe / å ikke ha noe valg
    Jeg er nødt til å jobbe i dag.  
    Vi var nødt til å vente lenge.  
    Hun blir nødt til å flytte.  
    Betydning:
    Når du ikke har noe valg og må gjøre noe på grunn av en situasjon eller et krav.

- question: "å være vant til noe"
  answer: |
    to be used to / accustomed to something
    Jeg er vant til kulda.
    Han er vant til å jobbe mye.
    
- question: "å være flink til noe"
  answer: |
    to be good at something
    Hun er flink til å lage mat.

- question: "å være medlem av noe"
  answer: |
    to be a member of something
    Jeg er medlem av en klubb.
    Han er medlem av et politisk parti.
    (Mange stemmer på et politisk parti.)

- question: "å fange opp noe (Idéer/Temaer/Poenget)"
  answer: |
    to grasp something / to pick up something
    Du har fanget opp alle de store konseptene.
    Jeg kunne ikke fange opp poenget i taleren sitt argument.
    Det er vanskelig å fange opp subtile forskjeller i kulturen.
    Jeg fikk ikke fange opp signalet.

- question: "å være interessert i noe"
  answer: |
    to be interested in something
    Jeg er interessert i teknologi

- question: "å tvile på noe"
  answer: |
    to doubt on something (tviler-tvilte-har tvilt)
    Jeg tviler på historien hans
    Hun tviler på at det vil fungere 
    Det er ingen grunn til å tvile
    Jeg begynner å tvile

- question: "å være eksponert for noe"
  answer: |
    to be exposed to something
    Barn er eksponert for mye skjermtid.
    Arbeidere kan være eksponert for farlige kjemikalier (chemicals)

- question: "å være imponert over noe/noen"
  answer: |
    to be impressed by something/someone
    Jeg er imponert over arbeidet ditt.
    Hun ble imponert over resultatet.
    Vi var imponert over hvor raskt han lærte norsk.
    
- question: "å sette pris på noe"
  answer: |
    to appreciate something
    Jeg setter stor pris på det 
    Hun setter pris på ærlighet

- question: "kommer an på/kommer til å"
  answer: |
    depends on/going to 
    Det kommer an på været
    Det kommer til å regne i morgen

- question: "å legge seg/å legge til noe"
  answer: |
    to go to bed / to add (something)
    Jeg legger meg klokka ti. 
    Kan du legge til navnet mitt?
    Hun la til en kommentar.

- question: "passer for/passer på"
  answer: |
    suitable for/takeing care of
    Jeg passer på barna
    Filmen passer for barn.

- question: "å være fornøyd med noe"
  answer: |
    satisfied
    Jeg er fornøyd med resultatet

- question: "å være bekymret for noen/noe"
  answer: |
    worried
    Jeg er bekymret for deg
    Jeg er bekymret for fremtiden

- question: "å være redd for [noe/å gjøre noe]"
  answer: |
    afraid; redd for=afraid of 
    Mange innvandrere er redde for norskprøven
    Han er redd for å fly
  
- question: "å redde noen"
  answer: |
    to save/rescue
    Brannmannen reddet mange mennesker
    redningsmann = saviour

- question: "å skade noe eller noen/å skade seg"
  answer: |
    to hurt/damage/injure (skader-skadet-har skadet)
    Han skadet kneet sitt. Hun skadet seg i ulykken.  
    Stormen skadet huset.  
    Jeg trodde at han skulle skade deg, og jeg ville redde deg. 
    Du kommer jo alltid til å være storbroren min. (fra ragnarok) 

- question: "å slette noe"
  answer: |
    to delete something (sletter-slettet-har slettet)
    Jeg slettet meldingen.
    Kan du slette denne filen?

- question: "å forby noe"
  answer: |
    to forbid/ban something (forbyr-forbød-har forbudt)
    Skolen forbød mobiltelefoner i timen.  
    Regjeringen vil forby sexleketøy.  
    Det er forbudt å røyke her.  
    Mange land har forbudt dette stoffet.  

- question: "å tilby noe"
  answer: |
    to offer/provide something (tilbyr-tilbød-har tilbudt )
    Selskapet tilbyr gratis frakt.  
    Hun tilbød meg hjelp.  
    Restauranten tilbyr vegetarisk mat.  
    Skolen tilbyr norskundervisning.  
    De tilbyr gode priser på produktene.  
    (et tilbud = an offer/discount)

- question: "å skuffe noen / å være skuffet over noe/noen"
  answer: |
    to disappoint someone (skuffer-skuffet-har skuffet)
    Jeg vil ikke skuffe deg.
    Han skuffet familien sin.
    Hun er skuffet over læreren sin.
    
- question: "å fortjene noe"
  answer: |
    to deserve (fortjener-fortjente-har fortjent)
    Du fortjener en pause.
    Hun fortjener respekt.
    Barna fortjener et trygt miljø.
    Han jobbet hardt og fortjente suksessen.

- question: "å påstå noe"
  answer: |
    to claim something (påstår-påsto-har påstått )
    Han påstår at det er sant.  
    Hun påstår at hun ikke visste det.  
    De påstår at de har rett.  
    Mange påstår at dette er et problem.  
    (en påstand = a claim)

- question: "å korrigere noe"
  answer: |
    to correct the mistake → å rette feil (korrigerer-Korrigert-har Korrigert)
    læreren korrigerer teksten din
    Jeg korrigerte svaret mitt
    korreksjon (substantiv) = en retting, korrekt (adjektiv) = riktig

- question: "å være trygg"
  answer: |
    be safe
    Jeg føler meg trygg her → I feel safe here
    Barna er trygge på skolen
    Dette er et trygt sted å bo

- question: "å bli forsinket"
  answer: |
    delayed
    Toget er forsinket

- question: "å ta ansvar for noe"
  answer: |
    to take responsibility for somethihng
    Alle må ta ansvar for miljøet.
    Jeg mener at politikarne må ta ansvar for miliøet.

- question: "å ta verbal familie"
  answer: |
    å ta på seg noe → to put on (Jeg tar på meg jakken)
    å ta av noe → to take off/remove (Han tar av jakken)
    å ta med noe → to bring / take with you(Kan du ta med boken?)
    å ta opp noe → to bring up (Vi må ta opp dette problemet)
 
- question: "verb som slutter på -tatt"
  answer: |
    å ta → tatt (Pakken er tatt) → opptatt
    å motta →	mottatt (Jeg har mottatt pakken)
    å avta → avtatt (Smerten har avtatt, pain has decreased)
    å innta →	inntatt (Tyske styrker inntok Oslo i 1940) 

- question: "verb som slutter på -gå"
  answer: |
    å unngå noe = to avoid → Vi må unngå konflikter.
    å inngå noe = to enter → inngå en avtale
    å pågå = to continue → Krigen pågår fortsatt (pågående)
    å gjennomgå = to review → Vi må gjennomgå dokumentene.
    å begå = to commit → begå en feil, begå kriminalitet
    
- question: "å trykke/å trekke/å skyve noe"
  answer: |
    trykke=to press/click(trykker/trykket/har trykket)
    Trykk på knappen. Jeg trykket feil.  
    å trekke=to pull/withdraw/draw (trekker-trakk-har trukket)
    Jeg trakk stolen nærmere. Jeg har trukket penger fra banken.
    å skyve = to push (skyver-skjøv-har skjøvet)
    Skyv døren igjen. Jeg har skjøvet stolen frem.

# Action verbs
#
- question: "å lære av noe"
  answer: |
    to learn from something
    Barna lærer mye av å delta i husarbeidet.
    Jeg lærer av erfaring.
    Vi lærer av feilene våre.

- question: "å miste noe/noen"
  answer: |
    to lose something/someone (mister/mistet/har mistet)
    Hun mistet nøklene sine.  
    De mistet kontakten.  
    Vi mistet en venn i ulykken.  

- question: "å ha noen rundt seg"
  answer: |
    to have someone around oneself/be surrounded by
    Hun vil alltid ha familien rundt seg.  
    Jeg trives med å ha gode kollegaer rundt meg.  
    At han ikke ville ha moren til Mange rundt seg.

- question: "å forenkle noe"
  answer: |
    to simplify something (å gjøre noe enklere)
    Jeg prøver å forenkle problemet.
    Kan du forenkle forklaringen?
    Vi må forenkle prosessen.

- question: "å knytte (noe) til noe"
  answer: |
    to connect / tie / form bonds
    å knytte seg til noen = become attached to someone
    å knytte bånd = form bonds
    Mange knytter lykke til penger.  
    Barn knytter seg til foreldrene sine.  
    Vi knyttet sterke bånd gjennom opplevelsene våre.  
    Jeg føler meg knyttet til Norge.  

- question: "å støtte noen/noe"
  answer: |
    to support (støtter-støttet-har støttet)
    Jeg støtter deg, Vi må støtte hverandre
    Hun støtter prosjektet
    Opplæring i norsk for voksne innvandrere skal støtte integrering og deltakelse i samfunnet

- question: "å satse på noe"
  answer: |
    å investere i/å prioritere/å fokusere på noe(satser-satset-har satset)
    Jeg vil satse på utdanning.  
    Norge satser på teknologi.  
    Han satser på en ny karriere.
    
- question: "å beskytte noen/noe"
  answer: |
    Askeladden prøver å beskytte prinsessen (kongeriket)
    Vi må beskytte naturen

- question: "å skyte noe/noen"
  answer: |
    to shoot (skyter-skjøt-har skutt)
    å skyte seg selv i foten (idiom)
    En profesjonell skytter
    Norsk Skytterforbund(The Norwegian Shooting Association)

- question: "å krangle med noen"
  answer: |
    to fight(krangler-kranglet-har kranglet)
    Barn krangler med hverandre
    Hun krangler med meg

- question: "å trykke på noe"
  answer: |
    press/push/click (trykker-trykket-har trykket)
    Trykk på knappen → Press the button

- question: "å lyve om noe/for noen"
  answer: |
    to lie (lyver-løy-har løyet)
    Han løy om sannheten
    Vi kan ikke bare fortsette å lyve for ham
    ikke lyv → dont lie

- question: "å prate om/med noen"
  answer: |
    to talk / to chat (prater-pratet-har pratet)
    Vi prater om været. → “We are chatting about the weather.”
    Han liker å prate med folk → He likes to talk with people

- question: "å bry seg om noe/noen"
  answer: |
    to care/to mind (bryr-brydde-har brydd)
    Jeg bryr meg om miljøet → I care about the environment
    Hun brydde seg om vennene sine

- question: "å uttrykke seg"
  answer: |
    to express oneself
    Det er viktig å kunne uttrykke seg godt.
    Hun uttrykker seg klart.
    Han har vanskelig for å uttrykke seg.

- question: "å sprekke noe"
  answer: |
    to crack/to pop 
    Ja, ballonger som sprekker

- question: "å jakte på noe/noen"
  answer: |
    hunt/chase (jakter-jaktet-har jaktet)
    Jeg jakter på elg → I hunt elk
    Politiet jakter på tyven → The police are chasing the thief

- question: "å spore opp noe/noen"
  answer: |
    track down/trace (sporer opp-sporet opp-har sporet opp)
    Politiet sporet opp tyven → The police tracked down the thief

- question: "å fange noe/noen"
  answer: |
    catch/capture (fanger-fanget-har fanget)
    De fanget fisken i elva → They caught the fish in the river

- question: "å grense til noe / å begrense noe"
  answer: |
    å grense til noe = to border / be adjacent to / be close to something
    Norge grenser til Sverige.
    ↔
    å begrense noe = to limit / restrict something
    Vi må begrense forbruket vårt.
    Regjeringen vil begrense utslipp. (The government wants to reduce emissions.)

- question: "å forsvinne"
  answer: |
    to disappear (forsvinner-forsvant-har forsvunnet)
    Han forsvant plutselig → He disappeared suddenly
    Alle andre er forsvunnet → Everyone else has disappeared

- question: "å sparke noe/noen"
  answer: |
    to kick (sparker-sparket-har sparket)
    styret valgte å sparke meg → The board decided to kick(fire) me.

- question: "å tilbringe tid med noen/noe"
  answer: |
    to spend time (tilbringe-tilbrakte-har tilbrakt)
    Jeg liker å tilbringe tid med familien min.

- question: "å bestå (av)"
  answer: |
    to pass(exam)/to consist of (bestå-bestod-har bestått)
    Bestå du første gangen? → did you pass it in first attempt
    Kurset består av fem deler. → The course consists of five parts.

- question: "å prestere"
  answer: |
    to perform/achieve/deliver
    prestasjon = achievement / performance
    Jeg må prestere godt på eksamen.
    Han presterer veldig bra på jobben.
    Det var en stor prestasjon å fullføre prosjektet.
    Hun er fornøyd med prestasjonen sin.
    
- question: "å vare"
  answer: |
    to last/to continue 
    Hvor lenge varer den? = How long does it last?

- question: "å foreslå"
  answer: |
    to suggest/propose (foreslår-foreslo-har foreslått)
    et forslag=a suggestion/a proposal
    Han foreslår at vi drar tidlig. 
    Jeg foreslår noe annet → I suggest something else
    Jeg har et forslag

- question: "å anbefale"
  answer: |
    to recommend (anbefaler-anbefalte-har anbefalt)
    Jeg anbefaler denne filmen. → I recommend this movie
    Hun har anbefalt den restauranten. → She has recommended that restaurant
    Jeg anbefaler på det sterkeste → I strongly recommend

- question: "å røre"
  answer: |
    to touch (physically)/to stir/mix (rører-rørte-har rørt)
    Ikke rør! → Don't touch!
    Hun rørte kaffen. → She stirred the coffee.
    Han ble rørt til tårer. → He was moved to tears.

- question: "å godkjenne"
  answer: |
    to approve / to authorize (godkjenner-godkjente-har godkjent)
    Kan du godkjenne det → can you approve it

- question: "å oppleve"
  answer: |
    to experience (opplever-opplevde-har opplevd)
    an experience = en opplevelse
    Erfaring = experience (skills); opplevelse = memorable event
    det ble en av de beste opplevelsene i livet mitt → it became one of the best experiences of my life.
  
- question: "å utforske"
  answer: |
    to explore (utforsker-utforsket-har utforsket)
    I fremtiden vil jeg utforske flere land i Europa → I future I want to explore many countries in europe

- question: "å oppfinne"
  answer: |
    to invent (oppfinner-oppfant-har oppfunnet)
    James Watt oppfant dampmaskinen

- question: "å utvide"
  answer: |
    to expand / extend / widen (utvider-utvidet-har utvidet)
    å utvide en åpning → to widen an opening
    Vi må utvide virksomheten → We need to expand the business

- question: "å oversette"
  answer: |
    to translate (oversetter-oversatte-har oversatt)
    boken er oversatt til mange språk

- question: "å gjette"
  answer: |
    to guess (gjetter-gjettet-har gjettet)
    Kan du gjette hva som skjedde? → Can you guess what happened?
    Jeg bare gjetter → I'm just guessing

- question: "å forberede"
  answer: |
    to prepare (forbereder-forberedte-har forberedt)
    De forbereder maten til festen → They are preparing the food for the party

- question: "å tenne"
  answer: |
    to light/ignite/turn on (tenner-tente-har tent)
    å tenne på bålet → to light the /bonfire
    å tenne opp i peisen/ovnen
    Læreren tente gnisten hos elevene

- question: "å tjene"
  answer: |
    to serve/to earn(tjener-tjente-har tjent)
    Han tjener mye penger → He earns a lot of money
    Jeg vil tjene samfunnet → I want to serve society
    tjeneste=service (Han gjør en god tjeneste for samfunnet)

- question: "å forvirre"
  answer: |
    to confuse (forvirrer-forvirret-har forvirret)
    det forvirrer mange
    Jeg ble helt forvirret 
    (forvirring=confusion)

- question: "å forvandle"
  answer: |
    to transform (forvandler-forvandlet-har forvandlet)

- question: "å overraske"
  answer: |
    to surprise (overrasker-overrasket-har overrasket)
    Han overrasket henne med blomster
    Jeg ble overrasket over resultatet
    gaven skal være en overraskelse
    (en overraskelse=a surprise)

- question: "å ødelegge"
  answer: |
    to destroy/ruin/break (ødelegger-ødela-har ødelagt)
    ødelagt=broken (as adjective)
    Jeg ødela mobilen min
    Regnet ødela festen 
    Maten ble ødelagt fordi kjøleskapet ikke fungerte.

- question: "å gjenkjenne"
  answer: |
    to recognize (gjenkjenner-gjenkjente-har gjenkjent)
    Jeg gjenkjenner stemmen din (your voice)
    The prefix “gjen-” in norsk is like “re-” or again/back.
    gjenta → repeat (do again)
    gjenopprette → restore 
    gjenbruke	→ reuse

- question: "å bidra"
  answer: |
    to contribute (bidrar-bidro-har bidradd)
    bidra med penger til en innsamling
    Jeg bidrar til miljøet

- question: "å kreve"
  answer: |
    to demand/require (krever-krevde-har krevd)
    Jeg krever svar
    Han krevde en forklaring
    krevende situasjon/Situasjonen er krevende
    Krav = demands
  
- question: "å legge merke til"
  answer: |
    to notice/observe (legger merke til-la merke til-har lagt merke til)
    Jeg legger merke til detaljer
    Jeg la merke til det
    Har du lagt merke til dette?

- question: "å delta"
  answer: |
    to participate (deltar-deltok-har deltatt)
    del+ta=take part
    Norge har ikke deltatt i VM på 28 år
    men neste år skal de det.
    VM=verdensmesterskap=World Cup

- question: "å dele"
  answer: |
    to share/divide/split(deler-delte-har delt)
    Jeg deler maten med deg (deler med)
    Vi deler på ansvaret (share responsibility)
    De delte på oppgaven (split the task)
    Læreren deler opp klassen i grupper
    Veien deler seg her → The road splits here

- question: "å klage"
  answer: |
    to complain (klager-klaget-har klaget)
    Han klager hele tiden
    Hun klaget på maten

- question: "å oppmuntre"
  answer: |
    to encourage(oppmuntrer-oppmuntret-har oppmuntret)

- question: "å lede"
  answer: |
    to lead/manage(leder-ledet-har ledet)
    leder=leader
    ledelse=Management
    toppledelse → top management
    prosjektledelse → project management

- question: "å vurdere"
  answer: |
    to consider/assess/evaluate(vurderer-vurderte-har vurdert)
    Jeg vurderer tilbudet(considering)
    Vi må vurdere situasjonen(assess)
    Jeg tar forslaget videre internt for vurdering

- question: "å tilhøre"
  answer: |
    to belong(tilhører-tilhørte-har tilhørt)
    skogen tilhører kommunen

- question: "å orke"
  answer: |
    to have the energy/to handle (orker-orket-har orket)
    Jeg orker ikke mer → I can't take it anymore
    Hun orker ikke å lage middag i dag

- question: "å være deprimert"
  answer: |
    to be depressed

- question: "å lukte"
  answer: |
    to smell(lukter-luktet-har luktet)

- question: "å bevege"
  answer: |
    to move(beveger-beveget-har beveget)
    Å bevege noe → vinden beveget bladene
    Å bevege noen → Filmen beveget henne dypt
    Å bevege seg → Han beveger seg sakte
    bevegelse = movement

- question: "å avansere"
  answer: |
    to advance (avanserer-avanserte-har avansert)
    avanserte systemer → advanced systems
