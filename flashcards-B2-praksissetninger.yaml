- question: "Tema 1 familie og hverdagsliv (01)"
  answer: |
    Familien er en viktig del av livet vårt.
    Selv om mange bor alene, er familien fortsatt viktig i Norge.
    Hverdagen kan være travel når man kombinerer jobb og familie.
    Mange prøver å balansere arbeid, fritid og familieliv.
    Jeg mener at gode rutiner skaper trygghet for barna.

- question: "Tema 1 familie og hverdagsliv (02)"
  answer: |
    Det er krevende å oppdra barn i et samfunn med mange påvirkninger.
    Barna lærer mye av å delta i husarbeidet.
    Selv om alle er slitne, forsøker vi å spise middag sammen.
    Mange opplever at kvalitetstid er viktigere enn materielle ting.
    Jeg tror at åpen kommunikasjon er nøkkelen til et godt familieliv.

- question: "Tema 1 familie og hverdagsliv (03)"
  answer: |
    Besteforeldre spiller en viktig rolle i mange familier.
    Familien gir oss både støtte og ansvar.
    Selv om konflikter kan oppstå, kan de styrke forholdet hvis vi løser dem riktig.
    Jeg synes det er viktig å lære barn respekt og empati.
    Mange familier blander tradisjoner fra ulike kulturer.
    
- question: "Tema 1 familie og hverdagsliv (04)"
  answer: |
    Teknologi kan være både en ressurs og en utfordring i familielivet.
    Det er lettere å håndtere hverdagen når vi samarbeider.
    Noen familier sliter økonomisk selv om de jobber hardt.
    Jeg tror at felles opplevelser skaper sterke bånd.
    Barna trenger både frihet og grenser for å utvikle seg.
    
- question: "Tema 1 familie og hverdagsliv (05)"
  answer: |
    Selv om vi bor i et rikt land, har ikke alle et trygt familieliv.
    Jeg mener at familien er grunnlaget for et stabilt samfunn.

- question: "Tema 2 - Norge (01)"
  answer: |
    Norge er et land med høy levestandard sammenlignet med andre land.
    Selv om vi har mye velstand, finnes det også sosiale forskjeller.(velstand=prosperity)
    Mange setter pris på naturen som en viktig dev av norsk identitet.
    Norge er kjent for demokrati og politisk stabilitet.
    Innvandring har forandret samfunnet og gjort det mer mangfoldig.

- question: "Tema 2 - Norge (02)"
  answer: |
    Selv om vi har ytringsfrihet, finnes det grenser for hva man kan si.
    Selv om Norge har ytringsfrihet, er det ikke lov å spre hat, true andre eller oppfordre til vold. (å true=to threaten)
    Jeg synes det er positivt at Norge deltar i internasjonalt samarbeid.
    Mange opplever at likestilling er viktig verdi i Norge. (var-Di=hard D uttale)
    Jeg tror frivillighet er en viktig del av det norske samfunnet.

- question: "Tema 2 - Norge (03)"
  answer: |
    Norge er rikt på naturressurse som olje, gass og fisk.
    Jeg synes det er viktig å satse på utdanning og teknologi.(å satse på=to invest in)
    Selv om vi har mye frihet, har vi også ansvar for fellesskapet.
    Jeg mener at toleranse er en viktig verdi i dagens norge.
    Norge har blitt mer internasjonalt på grunn av globaliseringen

- question: "Tema 2 - Norge (04)"
  answer: |
    Jeg synes det er positivt at ulike kuturer møtes i Norge.
    Jeg tror vi trenger mer dialog mellom ulike grupper.
    Selv om landet er lite, har norge stor innflytense internasjonalt.
    Norge i dag er et samfunn i stadig utvikling. (stadig=steady/constant)

- question: "Tema 3 - helse, trvisel og livsmestring (01)"
  answer: |
    God helse handler både om kroppen og om hvordan vi har det psykisk.
    Jeg mener at fysisk aktivitet er avgjørende for god helse.
    Stress kan gi både psykiske og fysiske problemer.
    Mange unge opplever press fra skole og sosiale medier.
    Jeg synes der er viktig å snakke åpent om psykiske problemer.

- question: "Tema 3 - helse, trvisel og livsmestring (02)"
  answer: |
    Søvm er like viktig for helsen som mat og trening.
    Selv om vi har tilgang til helsetjenester, er ikke alle fornøyde.
    Jeg tror at forbygging et billigere og bedre enn behandling.
    Mange mennesker sliter med livsstilssykdommer som diabetes og høyt blodtrykk.
    Livsmestring handler også om å tåle motgang.
    
- question: "Tema 3 - helse, trvisel og livsmestring (03)"
  answer: |
    Selv om livet er vanskelig, kan vi finne mening i små ting.
    Mange unge sliter fordi de sammenligner seg med andre.
    Jeg synes det er viktig å ha realistiske forventninger til seg selv.
    Fysisk aktivitet kan hjelpe mot både angst og depresjon.
    Jeg tror at humor og glede er viktige deler av livsmestring.

- question: "Tema 3 - helse, trvisel og livsmestring (04)"
  answer: |  
    Sosial støtte kan være avgjørende i vanskelige perioder.
    Jeg tror at små mål i hverdagen kan øke motivasjonen.
    

