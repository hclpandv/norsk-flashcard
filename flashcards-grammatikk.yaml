# Main rules tp remember
# - V2 regel med adverbial
# - Setningsstruktur med Helsetning, Leddsetning
# 
##
---
- question: "Beste - meste"
  answer: |
    For det meste går jeg til Sentrum. 
    ** Min beste venn.. den beste vennen **
    Min beste venn er Mari (Min eneste venn er Mari), Min mest interessante venn er Mari
    Mari er den beste vennen jeg har.
    Kari er en av de mest populære vennene mine.

- question: "fortsette vs fortsatt"
  answer: |
    fortsette (verb) = to continue
    Jeg fortsetter å lære norsk.
    Vi må fortsette arbeidet.
    fortsatt (adverb) = still / yet
    Jeg er fortsatt trøtt.
    Han jobber fortsatt her. Selv om vi i Norge har kommet langt med likestilling, har vi fortsatt en vei å gå.

- question: "Helsetning - Leddsetning"
  answer: |
    Jeg *spiller ikke* cricket [fordi jeg *ikke er* fra India.]
    Jeg føler meg ikke så ensom, [selv om jeg ikke har mange venner]

- question: "nær - i nærheten av"
  answer: |
    Jeg bor nær skolen / Jeg bor i nærheten av skolen.  
    Mortensrud er nær der jeg bor, men Lambertseter er nærmere.

- question: "refleksive pronomen"
  answer: |
    Jeg føler meg og du føler deg..Dere føler dere og hun føler seg...
    vi føler oss og de føler seg.. 
    
- question: "så/etterpå/deretter (rekkefølge)"
  answer: |
    Først står jeg opp. Deretter spiser jeg frokost. Etterpå går jeg på jobb. Så tar jeg bussen.
    Om kvelden er jeg hjemme cirka kl 6. Først tar jeg meg litt tid til å slappe av og skifter klær. Så begynner jeg å lage middag.

- question: "faktisk, egentlig, spesielt, generelt 👉 = setningsadverbial"
  answer: |
    behave like ikke
    Jeg er faktisk fra India. Det er faktisk sant.
    Jeg liker sport, spesielt cricket. 
    Det er spesielt viktig at vi egentlig ser hele episoden.
    Jeg vil egentlig ikke gå. Hva gjør du egentlig?
    mange spesielle retter (adjective form)

- question: "verb → noun patterns"
  answer: |
    å mene → en mening, å forklare → en forklaring, å forbedre → en forbedring, å bygge → en bygning, å søke → en søknad (application), å endre → en endring, å løse → en løsning, å avslutte→ en avslutning(ending), å starte → en start, å arbeide → et arbeid (work), å svare → et svar, å velge → et valg (choice), å møte → et møte (meeting)

- question: "adjective vs adverb"
  answer: |
    Adj= describes a noun / Adv = describes a verb
    Det er en fin dag fordi alt går fint.
    Han er en god lærer fordi han forklarer godt.
    Resultatet av kampen var dårlig fordi hun spilte dårlig. (same)
    Hun er rask fordi hun løper fort.

- question: "adjective → adverb patterns"
  answer: |
    klar → klart, fin → fint, god → godt, dårlig → dårlig
    vanlig → vanligvis, heldig → heldigvis, nødvendigvis, delvis (Jeg er delvis enig.)

- question: "kunne, ville, skulle"
  answer: |
    å kunne gjøre noe = Jeg kunne svømme
    å skulle gjøre noe = Jeg skulle ringe deg (may or may not have happened)
    å kunne ha vært noe = Det kunne ha vært bedre (could have been better)
    å kunne ha gjort noe = Jeg kunne ha sagt (could have said)
    å ville ha gjort noe = Jeg ville ha gjort det (would have done it)

- question: "Jo mer jeg gjør noe, jo mer vil jeg gjøre noe"
  answer: |
    Jo mer jeg sover, jo mer vil jeg sove.
    Jo mer jeg sover, jo bedre føler jeg meg.
    Jo flere skumle filmer jeg ser, jo mer redd blir jeg når jeg er alene hjemme.

