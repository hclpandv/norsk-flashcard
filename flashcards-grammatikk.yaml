# Main rules tp remember
# - V2 regel med adverbial
# - Setningsstruktur med Helsetning, Leddsetning
# 
##
---
- question: "Beste - meste"
  answer: |
    For det meste gГҘr jeg til Sentrum. 
    ** Min beste venn.. den beste vennen **
    Min beste venn er Mari (Min eneste venn er Mari), Min mest interessante venn er Mari
    Mari er den beste vennen jeg har.
    Kari er en av de mest populГҰre vennene mine.

- question: "FГёrste vs FГёrst"
  answer: |
    FГёrste = 1. = ordinal number for 1 
    Dette er fГёrste gangen jeg er her.
    Jeg vil ha fГёrste plassen.
    вҶ”
    FГёrst = First in sequence (FГёr det andre skjedde, skjedde dette.)
    FГёrst spiser jeg frokost, og etterpГҘ tar jeg bussen.
    FГёrst mГҘ vi kjГёpe billetter.

- question: "fortsette vs fortsatt"
  answer: |
    fortsette (verb) = to continue
    Jeg fortsetter ГҘ lГҰre norsk.
    Vi mГҘ fortsette arbeidet.
    вҶ”
    fortsatt (adverb) = still / yet
    Jeg er fortsatt trГёtt.
    Han jobber fortsatt her. Selv om vi i Norge har kommet langt med likestilling, har vi fortsatt en vei ГҘ gГҘ.

- question: "Helsetning - Leddsetning"
  answer: |
    Jeg *spiller ikke* cricket [fordi jeg *ikke er* fra India.]
    Jeg fГёler meg ikke sГҘ ensom, [selv om jeg ikke har mange venner]

- question: "nГҰr - i nГҰrheten av"
  answer: |
    Jeg bor nГҰr skolen / Jeg bor i nГҰrheten av skolen.  
    Mortensrud er nГҰr der jeg bor, men Lambertseter er nГҰrmere.

- question: "refleksive pronomen"
  answer: |
    Jeg fГёler meg og du fГёler deg..Dere fГёler dere og hun fГёler seg...
    vi fГёler oss og de fГёler seg.. 
    
- question: "sГҘ/etterpГҘ/deretter (rekkefГёlge)"
  answer: |
    FГёrst stГҘr jeg opp. Deretter spiser jeg frokost. EtterpГҘ gГҘr jeg pГҘ jobb. SГҘ tar jeg bussen.
    Om kvelden er jeg hjemme cirka kl 6. FГёrst tar jeg meg litt tid til ГҘ slappe av og skifter klГҰr. SГҘ begynner jeg ГҘ lage middag.

- question: "faktisk, egentlig, spesielt, generelt рҹ‘ү = setningsadverbial"
  answer: |
    behave like ikke
    Jeg er faktisk fra India. Det er faktisk sant.
    Jeg liker sport, spesielt cricket. 
    Det er spesielt viktig at vi egentlig ser hele episoden.
    Jeg vil egentlig ikke gГҘ. Hva gjГёr du egentlig?
    mange spesielle retter (adjective form)

- question: "adjective vs adverb"
  answer: |
    Adj=describes noun/Adv=describes verb
    Det er en fin dag fordi alt gГҘr fint.
    Han er en god lГҰrer fordi han forklarer godt.
    Resultatet av kampen var dГҘrlig fordi hun spilte dГҘrlig. (same)
    Hun er rask fordi hun lГёper fort.

- question: "adjective вҶ’ adverb patterns"
  answer: |
    klar вҶ’ klart, fin вҶ’ fint, god вҶ’ godt, dГҘrlig вҶ’ dГҘrlig
    vanlig вҶ’ vanligvis, heldig вҶ’ heldigvis, nГёdvendigvis, delvis (Jeg er delvis enig.)

- question: "verb вҶ’ noun patterns"
  answer: |
    ГҘ mene вҶ’ en mening, ГҘ forklare вҶ’ en forklaring, ГҘ forbedre вҶ’ en forbedring, ГҘ bygge вҶ’ en bygning, ГҘ sГёke вҶ’ en sГёknad (application), ГҘ endre вҶ’ en endring, ГҘ lГёse вҶ’ en lГёsning, ГҘ avslutteвҶ’ en avslutning(ending), ГҘ starte вҶ’ en start, ГҘ arbeide вҶ’ et arbeid (work), ГҘ svare вҶ’ et svar, ГҘ velge вҶ’ et valg (choice), ГҘ mГёte вҶ’ et mГёte (meeting)

- question: "for- verbs patterns"
  answer: |
    ГҘ gjГёre noe mer X (forenkle, forbedre)
    forklareвҶ’explain (gjГёre klart), 
    forlengeвҶ’extend, forberedeвҶ’prepare, 
    forkorteвҶ’shorten, forsterkeвҶ’strengthen,
    forsikreвҶ’assure, forhandleвҶ’negotiate,
    fordeleвҶ’distribute, forbrukeвҶ’consume,
    forenkle seg вҶ’ become simpler
    forbedre seg вҶ’ improve (oneself)
    forandre seg вҶ’ change (oneself)

- question: "kunne, ville, skulle"
  answer: |
    ГҘ kunne gjГёre noe = Jeg kunne svГёmme
    ГҘ skulle gjГёre noe = Jeg skulle ringe deg (may or may not have happened)
    ГҘ kunne ha vГҰrt noe = Det kunne ha vГҰrt bedre (could have been better)
    ГҘ kunne ha gjort noe = Jeg kunne ha sagt (could have said)
    ГҘ ville ha gjort noe = Jeg ville ha gjort det (would have done it)

- question: "Jo mer jeg gjГёr noe, jo mer vil jeg gjГёre noe"
  answer: |
    Jo mer jeg sover, jo mer vil jeg sove.
    Jo mer jeg sover, jo bedre fГёler jeg meg.
    Jo flere skumle filmer jeg ser, jo mer redd blir jeg nГҘr jeg er alene hjemme.

- question: "lett vs enkel"
  answer: |
    lett = easy (requires little effort)
    Det er lett ГҘ lГҰre norsk. Det er lett ГҘ forstГҘ.
    enkel = simple (not complicated)
    Forklaringen er enkel. Det er enkelt ГҘ forstГҘ.

- question: "reflexive verbs (ГҘ ... seg)"
  answer: |
    ГҘ fГёle seg,  ГҘ glede seg til noe вҶ’ Jeg gleder meg til ferien.
    ГҘ kose seg вҶ’ to enjoy oneself
    ГҘ legge seg вҶ’ to go to bed
    ГҘ kle pГҘ seg вҶ’ to get dressed
    ГҘ ta pГҘ seg вҶ’ to put on (clothes)
    Hun tar pГҘ seg jakken вҶ’ She puts on the jacket, ГҘ konsentrere seg вҶ’ to concentrate

- question: "Etymologi av norsk (opprinnelse=origin)"
  answer: |
    Norsk har flere sprГҘklige opprinnelser:
    NorrГёnt (gammelnorsk): barn, hus, mann, dag, vann, kveld osv.
    Dansk pГҘvirkning: skole, bok, viktig
    Latin: informasjon, kommunikasjon, kultur, politikk, universitet, eksamen
    Tysk (tysk/germansk pГҘvirkning): arbeid, handel, pris, betale, kjГёpe
    Moderne engelsk: jobb, team, chatte, internett, business

- question: "Substantiver som slutter pГҘ -itet"
  answer: |
    Disse ordene kan forveksles med bestemt form, men -itet er en del av selve ordet (ikke en grammatisk endelse).
    identitet вҶ’ identiteten  
    aktivitet вҶ’ aktiviteten  
    kvalitet вҶ’ kvaliteten  
    universitet вҶ’ universitetet  
    mentalitet вҶ’ mentaliteten

