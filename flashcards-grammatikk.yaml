- question: "Beste - meste"
  answer: |
    For det meste går jeg til Sentrum. 
    Min beste venn.. den beste vennen
    Min beste venn er Mari (Min eneste venn er Mari), Min mest interessante venn er Mari
    Mari er den beste vennen jeg har.
    Kari er en av de mest populære vennene mine.

- question: "Helsetning - Leddsetning"
  answer: |
    Jeg *spiller ikke* cricket [fordi jeg *ikke er* fra India.]
    Jeg føler meg ikke så ensom, [selv om jeg ikke har mange venner]

- question: "nær - i nærheten av"
  answer: |
    Jeg bor nær skolen / Jeg bor i nærheten av skolen.  
    Mortensrud er nær der jeg bor, men Lambertseter er nærmere.

- question: "refleksive pronomen"
  answer: |
    Jeg føler meg og du føler deg.. vi føler oss og de føler seg.. 
