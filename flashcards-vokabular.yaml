- question: "Beskrive barna dine"
  answer: |
    søt→cute, snill→kind
    flink→good/well-behaved/skilled
    Begge er flink på skolen.
    rolig→calm, aktiv→active, nysgjerrig→curious
    rampete→naughty (playful, very common)
    Hun er litt rampete.
    sjenert→shy
    Den eldste er sjenert, og den yngste er litt rampete.




    