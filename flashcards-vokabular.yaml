    ved spesielle anledninger → on special occasions
    bryllup og andre anledninger

- question: "mangfold"
  answer: |
    diversity

- question: "regjering"
  answer: |
    Government

- question: "enda"
  answer: |
    even / still
    Det er enda kaldere i dag. → It is even colder today.
    Jeg er enda trøtt. → I am still tired.
    ikke enda → not yet

- question: "unna"
  answer: |
    away
    Butikken ligger langt unna → The store is far away.
    Jeg må gi klærne mine unna → I have to give my cloths away

- question: "selvstendig"
  answer: |
    independent / self-reliant
    Hun er veldig selvstendig.
    Han jobber selvstendig.
    Barn lærer å bli selvstendige.
    stendig = standing/firm → idea of standing on your own

- question: "en nyanse"
  answer: |
    en nyanse → a nuance / a subtle difference / a shade
    Det er en liten nyanse mellom disse ordene.
    Vi må forstå nyansene i språket.
    Fargene har mange nyanser.

- question: "et mønster"
  answer: |
    et mønster → a pattern (mønsteret-mønstre-mønstrene)
    Jeg ser flere mønstre.
    Mønstrene er tydelige.
    
- question: "kompis vs venn vs kamerat"
  answer: |
    kompis = buddy / mate (very informal, friendly)
    Hei, kompis! → Hey, buddy!
    kamerat = comrade / buddy (slightly old-fashioned)
    Han er en gammel kamerat.
    kompis = casual friend
    venn = general word for friend
    kamerat = older tone / specific contexts

- question: "kitchen vocabulary (et kjøkken)"
  answer: |
    et kjøleskap, en fryser → Vi har is i fryseren, en komfyr→a stove, Hun lager mat på komfyren.
    en ovn→an oven, en oppvaskmaskin→a dishwasher, en vask→a sink, Koppen ligger i vasken.
    en kran→a tap/faucet, Skru på kranen., en tallerken→a plate, et bestikk → cutlery
    Hvor er bestikket?, en kniv → a knife, en gaffel → a fork, en skje → a spoon

- question: "Natur og geografi vokabular (en natur)"
  answer: |
    Dette fylket er vakkert plassert langs Norges vestkyst (west coast). Det ligger på Nordvestlandet og grenser til Trøndelag i nord. Regionen er rik på natur, historie og kultur. Fylket har dramatiske fjorder og majestetiske fjell som tiltrekker folk fra hele verden. Noen høydepunkter er imponerende veier som Trollstigen og Atlanterhavsveien. (høydepunkter = highlights)

- question: "Miljø vokabular (et Miljø)"
  answer: |
    Vi må ta vare på miljøet.
    Klimaet blir varmere hvert år. 
    Klimaendringer er et stort globalt problem.
    Elbiler blir stadig mer populære fordi de bidrar til mindre forurensning i byområder. Biler fører til store CO2-utslipp.
    Vi må redusere matsvinn hjemme.
    Plastforsøpling er et stort problem i havet.
    Forbruket vårt er for høyt i dag.

- question: "Tiltak og løsninger vokabular"
  answer: |
    Jeg driver med kildesortering hver dag for å ta vare på miljøet.
    Gjenvinning er bra for miljøet og reduserer avfall. 
    fornybar energi = renewable
    Norge bruker mye fornybar energi, som er et miljøvennlig alternativ.
