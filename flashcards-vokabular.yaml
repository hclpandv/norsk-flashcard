# Substantiver
#
- question: "en hjerne"
  answer: |
    a brain
    Hjernen styrer kroppen.

- question: "ei måke"
  answer: |
    seagull (ei måke-måker-måkene)
    Den måka dreit på huet ditt → That seagull pooped on your head

- question: "En beskjed"
  answer: |
    a message
    Gi meg beskjed om det passer → let me know if it suits you.

- question: "en råvare"
  answer: |
    raw material

- question: "en drit"
  answer: |
    poop/crap (en drit-driter-dritene)
    å drite → Han driter=He poops.

- question: "et fellesskap"
  answer: |
    community

- question: "ei løgn"
  answer: |
    lie (en løgn-løgner-løgnene)
    Det var en løgn. → That was a lie.
    Han forteller løgner hele tiden

- question: "en angriper"
  answer: |
    an attacker
    Angriperene har blitt smartere → The attackers have become smarter

- question: "en verdenskrig"
  answer: |
    world war (krig=war)
    Den første verdenskrigen startet i 1914.
    Den andre verdenskrigen sluttet i 1945.

- question: "ytringsfrihet"
  answer: |
    freedom of speech / freedom of expression
    Ytringsfrihet er en viktig verdi i et demokrati
    Alle har rett til ytringsfrihet
    å ytre seg = to express, en ytring = an expression

- question: "likestilling"
  answer: |
    equality / gender equality
    Norge er kjent for likestilling.
    Likestilling mellom menn og kvinner er viktig.
    Vi jobber for mer likestilling i samfunnet.
    like = equal
    stilling = position/status

- question: "En ulykke"
  answer: |
    an accident

- question: "En samling"
  answer: |
    a gathering

- question: "en forutsetning"
  answer: |
    a prerequisite / assumption
    En viktig forutsetning → An important prerequisite
    En grunnleggende forutsetning → A basic assumption

- question: "et tiltak"
  answer: |
    a measure
    (noe man gjør for å løse et problem eller forbedre noe)
    Flere busser kan være et godt tiltak mot trafikk

- question: "en utfordring"
  answer: |
    a challenge
    Å lære norsk kan være en utfordring for mange voksne

- question: "en helt"
  answer: |
    a hero (helten-helter-heltene)
    han er en helt

- question: "en innvandrer"
  answer: |
    an immigrant (flere innvandrere)

- question: "en fordel"
  answer: |
    an advantage
  
- question: "et selskap"
  answer: |
    a company/orgnaization(selskapet-selskaper-selskapene)
    Jeg jobber i et stort IT-selskap
    Selskapet vokser raskt
    aksjeselskap(AS)→aksje=share/stock
    aksjonær→shareholder

- question: "en ansatt"
  answer: |
    an employee(den ansatte, flere ansatte)
    Den ansatte jobber hardt (bestempt -e)
    Alle ansatte må møte opp (plural -e)

- question: "en avdeling"
  answer: |
    a department(avdelingen - avdelinger - avdelingene)
    Samarbeid mellom avdelingene er viktig

- question: "en verdi"
  answer: |
    a value(verdien-verdier-verdiene)
    Ærlighet er en viktig verdi
    Vi deler samme verdier i teamet

- question: "en alvorlig"
  answer: |
    serious
    Det er en alvorlig situasjon

- question: "sannheten"
  answer: |
    The truth
    (related: ikke sant)
    Sannheten er viktig
    Jeg vil vite sannheten

- question: "verdensrommet"
  answer: |
    the universe/outer space 🚀
    Astronauter reiser ut i verdensrommet → .. travel into space
    Det finnes mange planeter i verdensrommet
    en stjerne=star; et solsystem;en galakse; universet

- question: "hensyn"
  answer: |
    consideration(s) (plural also)
    Ta hensyn til andre → Take others into consideration
    Hensynet til sikkerheten → Consideration for safety
    Uten hensyn til loven → Without regard for the law

### Others
- question: "Knask eller knep"
  answer: |
    trick or treat
    Knask = candy / treats
    Knep = trick / prank

- question: "høytider"
  answer: |
    holidays

- question: "avgjørelser"
  answer: |
    decisions

- question: "lidenskap"
  answer: |
    passion

- question: "imot"
  answer: |
    against/opposed to/toward (preposition)
    Jeg er imot krig. → I am against war.
    Han løp imot meg. → He ran toward me.
    Jeg har ingenting imot deg. → I have nothing against you.

- question: "annen/annet/andre"
  answer: |
    other/another (annen-annet-andre)
    en annen dag → another day
    et annet sted → another place
    det andre huset → the other house
    De andre er allerede her → The others are already here

- question: "gjennom"
  answer: |
    through (preposition)
    Vi kjørte gjennom tunnelen → We drove through the tunnel  
    Han gikk gjennom hele boka → He went through the whole book  
    Hun kom seg gjennom en vanskelig tid → She got through a difficult time

- question: "Hemmelig"
  answer: |
    secret/hidden
    Kan du holde det hemmelig? → Can you keep it secret?
    Et hemmelig sted / hemmelig møte
    Han gjorde det i hemmelighet. → He did it in secret

- question: "vant"
  answer: |
    used to/accustomed to
    vant til=used to(habit, action, condition)
    vant med=familiar with(method, system, people)
    Han er vant til kulda
    Jeg er ikke vant til å stå opp så tidlig
    Vi er vant med dette systemet
    vant ≠ vant(preteritum av `å vinne=won`)

- question: "bærekraft"
  answer: |
    sustainability
    bære = to carry
    kraft = power/force
    the Earths ability to bear/carry us over time
    (A way to remember, not literal)

- question: "idrett"
  answer: |
    sports (feks: idrettsklubb)

- question: "stemmer"
  answer: |
    correct/to add up/to match
    Du bor i Oslo, ikke sant?(Stemmer)
    Det stemmer → That's correct
    Tallene stemmer ikke.
    Navnet ditt stemmer med passet?

- question: "rett og slett"
  answer: |
    simply/just/ plain and simple
    Det er rett og slett umulig

- question: "stolt av"
  answer: |
    proud of (achievements, actions, results)
    Han er stolt av jobben sin 
    Når er du stolt av deg selv?

- question: "en anledning"
  answer: |
    Occasions (anledningen-anledninger-anledningene)
    ved spesielle anledninger → on special occasions
    bryllup og andre anledninger

- question: "mangfold"
  answer: |
    diversity

- question: "regjering"
  answer: |
    Government

- question: "enda"
  answer: |
    even / still
    Det er enda kaldere i dag. → It is even colder today.
    Jeg er enda trøtt. → I am still tired.
    ikke enda → not yet

- question: "unna"
  answer: |
    away
    Butikken ligger langt unna → The store is far away.
    Jeg må gi klærne mine unna → I have to give my cloths away

- question: "selvstendig"
  answer: |
    independent / self-reliant
    Hun er veldig selvstendig.
    Han jobber selvstendig.
    Barn lærer å bli selvstendige.
    stendig = standing/firm → idea of standing on your own
  
  